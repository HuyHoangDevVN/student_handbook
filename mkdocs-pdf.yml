# =============================================================================
# Student IT Handbook - PDF build configuration
# Purpose: build a single print-friendly handbook page, then render it with
# Chromium via Playwright.
# =============================================================================

site_name: Student IT Handbook
site_description: >-
  Tai lieu huong dan thuc hanh IT danh cho sinh vien thuc tap va di lam.
  Bao gom Git, Docker, Linux, CI/CD, Database, va nhieu chu de khac.
site_author: DNU Education Team
site_url: https://<github-org>.github.io/student-it-handbook/

repo_name: <github-org>/student-it-handbook
repo_url: https://github.com/<github-org>/student-it-handbook
edit_uri: edit/main/docs/

theme:
  name: mkdocs

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - toc:
      permalink: false
      toc_depth: 3
  - tables
  - footnotes
  - attr_list
  - md_in_html

extra_css:
  - assets/css/pdf.css

validation:
  nav:
    omitted_files: ignore

nav:
  - Student IT Handbook: _generated/handbook-pdf.md
